name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: UTC # deterministic timezone tests (ES §6)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the CalendarEvent-major guard can diff against main
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile # never a plain install (ES §11)
      # Single source of truth: `verify` = build → typecheck → lint → test, in that order.
      # The same script runs locally and in the pre-push hook, so "passes locally" and "passes
      # in CI" can't diverge by command order (the cause of the earlier red build).
      - run: pnpm verify
      # The contract is the seam: a CalendarEvent change must carry a major changeset.
      - run: git fetch --no-tags origin main || true
      - run: pnpm guard:changeset

  # SAST. Free on public repos; wired early per ES §0 but not gating v0 locally.
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  # Nightly random-seed property/fuzz run; persist any failing seed as a regression (ES §6).
  nightly-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
