name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: UTC # deterministic timezone tests (ES §6)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile # never a plain install (ES §11)
      - run: pnpm build # build libs first so cross-package types/imports resolve (exports → dist)
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test # unit + property/fuzz, fixed-seed on PRs (ES §6)

  # SAST. Free on public repos; wired early per ES §0 but not gating v0 locally.
  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  # Nightly random-seed property/fuzz run; persist any failing seed as a regression (ES §6).
  nightly-fuzz:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
